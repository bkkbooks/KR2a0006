body:
  text: 史記疑問卷下欽天監左監副邵泰衢撰孫臏傳王之寵姬二人為隊長孫子欲斬之王從䑓上觀下令曰寡人非此二姬食不甘味願勿斬也孫子曰臣已受命遂斬之用其次為隊長復鼓之皆中規矩使報王曰用之雖赴水火可也王曰罷休孫子試兵也非穰苴之将兵也安得斬殺自由乎况王曰非此二姬食不甘味即欲必斬王亦早已罷休矣又何待報命之時哉更有疑者宫中無刑劊之人将召之外庭與王未必命之入也将即此之娥眉乎吾恐其力不能辦也至以一斬之威遂欲令娥眉之赴水火也與有不然矣夫豈兵之不必服心而徒恃之威刦者乎仲尼弟子列傳宰我為臨菑大夫與田常作亂以夷其族孔子恥之傳哀十四年子我歸屬徒不勝陳氏追之殺諸郭關子我者闞止也有寵于簡公陳成子憚之陳豹曰勿先必禍子此所以田常追子我而殺諸郭關也今曰宰我遷其以子我為宰我矣况陳恒弑君夫子請討之不得者也而我且安然為相即使與常為亂田氏其安而宰我其族乎求之聚斂夫子尚欲攻之况與于弑君之列乎討陳恒之不得討宰我亦不得乎言語之科我先子貢雖曰晝寢夫豈若斯子貢一出存魯亂齊破吳强晉伯越子貢一使使勢相破十年之中五國各有變性與天道賜也熟聞即列言語之科亦在博學多聞之列夫豈揣摩三載探知人主之性情利害相傾唯恃一時之口給秦儀一例害此利彼者與擬之不倫事難盡信貌觀似乎誇詡多能嘿思大為聖賢深恥故一出存魯可也而齊不必亂吳不必破先儒論之詳矣公伯寮字子周周愬子路于季孫道行道廢伯寮固不能如命何也然既云䜛愬安得尚列門墻鳴鼓之攻尤恐或緩遷乃列之弟子抑何本與朱子註曰公伯寮魯人邁乎遷矣明徹其祀宜也有若狀似孔子弟子相與共立為師師之如夫子弟子進問曰他日月宿畢竟不雨商瞿年四十後當五丈夫何也有若嘿然無以應弟子起曰有子避之此非子之位也狀似孔子共立為師愛屋及烏今乃以其形似即取為師不答所問即令避坐夫豈聖門賢者向不知有若之學而為之乎衆賢不如是之愚也有若亦不敢公然之肆也史通曰柴愚參魯品藻已詳如有若者名不列於四科譽無偕於十哲安得公然自欺詐相策奉此童兒相戲非長老所為得自委巷曽無先覺悲夫顔回少孔子三十歲二十九髮盡白蚤死按孔子卒于哀公十六年年七十三哀公十四年顔子死伯魚年五十先孔子死家語云回三十二而死按孔子生伯魚五十而死是時孔子六十九矣哀公十四年回死是孔子七十一矣計其年回當四十一非三十二也夫子曰短命者徳宜長年雖四十一亦曰短命耳謂二十九而髮白蚤死與三十二死者皆非也鯉先回死孔子年六十九而鯉卒若回三十二而死則先鯉矣伯夷傳伯夷曰父命也遂逃去叔齊亦不肯立而逃之聞西伯善飬老盍徃歸焉武王東伐紂伯夷叔齊叩馬而諫餓死首陽山既云盍徃歸焉是夷齊與太公同歸者也所謂待天下之清去腥聞之紂也夫商之太師尚陳洪範於周而㣲子之親亦且受封於宋何北海來歸之老獨枵腹而死義也况夷與太公為天下之二老武王伐商未有不咨而詢之者若不即我謀當孑然而去若即我謀亦當廷諍否則仍北海之北耳今不言於帷幄定謀之初而乃諫於干戈既出之日不徒托之空言與夫子曰餓于首陽之下未聞其餓而死也田之粟曰周粟山之薇獨非周薇乎蓋採薇而食不食周禄如顔子簞瓢可也若云餓死其殆過矣老子傳孔子去謂弟子曰吾今日見老子其猶龍邪孔子世家孔子適周問禮蓋見老子云老子送以言孔子自周反魯蓋問禮之不止於老子而老子獨送之言耳然其言不過曰若虚若愚而已又不過曰不議人不發人惡而已非古先哲王之至言也聖人曰竊比於我老彭者以其好古也今老子傳與孔子世家之言互異而亦非聖哲典謨之訓所謂異言者近之矣異言者誅将老子之幾同少正卯矣夫子安得嘆其猶龍哉况龍者易之飛龍見龍與夫聖人作覩之雲龍也老子安能當而夫子必不以為喻也吾以為老子既為柱下史而知禮者必其言有則古稱先王者在而必不若是之泛泛曰去子之驕多欲而已也馬遷好異之說也吳起傳魯欲将吳起起取齊女為妻而魯疑之吳起于是殺其妻以明不與齊也韓非子曰吳起使妻織組而幅狹于度使更之妻曰吾始經之而不可更也吳起出之噫為起之妻不亦難乎且夫婦人倫之重也就名而殺致功而出夫亦孰不可哉不能安其妻安能友其友而又為之君哉是故功名傑然而其君猜之大臣害之卒臠其尸也蘓秦傳嫂何前倨而後恭也曰季子位髙而多金耳秦之父母嫂妻前倨後恭家庭天性之間而市道存焉所恭又不過位與金耳知富貴而不知道義此所以終于車裂也雖然秦之功亦不過誇嫂婦之功亦秖見其過洛陽時耳若秦之庭說諸侯時不知道義其戴鬚眉為婦人宛媚舌敝以求說之一售何嘗有丈夫氣哉有妻有妾之一齊人耳妻嫂不泣于中庭而恭者未嘗瞷所之也商鞅傳公孫座謂惠王曰鞅有竒才願舉國聽之不用即殺之召鞅謝曰我言若為相王色不許我我方先君後臣勿用當殺之汝可疾去夫既先君後臣則告以疾去者不忠夫既召謝趣去而先告王必殺者不義不忠不義座兩有之吾說君以帝王之道而君曰久逺以强國之術說君君大說之耳鞅曰茍可以强國不法其故茍可以利民不循其禮井田學校之法盡廢於鞅刑刻慘苛之學全由於衛致古先聖王之遺意至今蕩然而不復者皆其罪也尚安敢曰帝王之道也哉曰不法故不循禮而三代百王之制淪矣又曰常人安於故俗學者溺於所聞而焚書坑儒愚民之所由來矣三王不同禮而王五伯不同法而霸罷封建置郡守自號始皇帝而尊君卑臣之所由起矣反古者不可非循禮者不足多則凡逸于倫常之外矯制殺扶蘓立胡亥指鹿為馬之無不可行矣至於收司連坐使民莫敢議令鞅始之斯繼之而漢不能復之民到于今受其害鞅罪寜淺鮮哉車裂以狥而滅其家未足贖也王安石之祖宗不足法天變不足畏人言不足恤者本是也孟嘗君傳趙人聞孟嘗君賢出觀之皆笑曰始以薛公為魁然今視之乃眇小丈夫耳孟嘗君聞之怒客與俱者下砍擊殺數百人遂滅一縣以去孟嘗聲聞諸侯傾天下士眇小一語遂致怒滅一縣乎况曰魁然也乃眇耳如子房之計魁梧竒偉見圖狀如婦人好女而已何至殺人滅縣乎即曰客也文獨不禁之乎即曰言者之有罪也豈一縣之老幼盡譁然言乎且以齊嘗而遽滅趙縣乎誠未喻也魏昭王以為相西合于秦趙與燕共伐破齊閔王亡在莒死焉魏世家昭魚曰田需死吾恐張儀犀首薛公有一人相魏者也吾終欲太子之自相也太子果相魏昭王十二年與秦趙韓燕共伐齊閔王出亡相國重任也伐齊大事也薛公相魏伐齊魏世家既無其事田文傳獨有其文豈相國之事無關於魏而伐齊之舉獨出之文者乎向日人毀於王文奔有賢者自剄宫門王乃復召孟嘗孟嘗因謝病歸老於薛事已釋然矣豈以此而云魏嘗伐齊致王之出亡而死乎且田文如果相魏則不若樂毅樂間之去燕矣孟嘗太息嘆曰食客三千餘人先生所知也客見文一日廢皆背文而去莫顧文者如復見文者必唾其面而大辱之冷煖人情其去來原不足輕重况皆鷄鳴狗盜之徒而所為士君子者鮮乎見文一日廢背去而不顧毋庸怪也但恐客雖背徳文蹈虚聲已耳使果致敬盡禮以隆賢者則亷恥勵節之士充滿於庭又何必三千食客而止此一彈鋏之馮驩哉至欲唾面大辱益徵其褊矣馮驩之技亦止鑿三窟為田文謀耳無他長也平原君傳平原君樓臨民家躄者行汲美人笑之躄者曰願得笑臣者頭平原君曰以一笑故殺吾美人不亦甚乎門下舍人稍稍引去平原君乃斬笑躄者客平原之客也美人平原之美人也情均也多情者必不割情能割情者必不多情今日可以割情斬美人又安知不可以割情斬客乎况以一笑之㣲毫無可殺之理而割情媚客使人聞之不曰忍心即曰市名耳忍心市名君子之所不屑交也而謂豪傑之肯至乎且後宫數百又安知其笑者為誰使後宫齊曰未嘗笑躄者吾軰自笑耳将若何揆諸人情物理必不然也范雎傳秦王屏左右宫中虚無人又曰左右多竊聽者范雎恐未敢言内先言外事既虗無人又安多竊聽者睢請為君見於張君須賈曰吾馬病車軸折非大車駟馬吾不出雎取大車駟馬為須賈御之入見雎雎曰汝罪有三所以得無死者以綈袍戀戀有故人之意故釋公而坐須賈於堂下置莝豆其前令兩黥徒夾而馬食之賈大夫也馬病軸折寜無副乎非大車駟馬吾不出若無范雎将終不出見張禄乎置堂下而馬食之戀戀故人意又安在乎初御之不必如是卑後食之又不必如是辱均云過矣秦昭王聞魏齊在平原君所乃為好書遺平原君入秦又遺趙王書曰王之弟在秦范君之仇魏齊在平原君之家使人疾馳其頭來否則不出王之弟于關魏齊自剄卒取頭予秦乃出平原君歸趙孟嘗入秦平原未嘗入秦也秦止孟嘗幸鷄鳴狗盜之出關也秦未嘗止平原得魏齊首而始出之關也平原君𫝊趙世家皆書平原如楚未嘗書平原入秦乃獨見之雎𫝊者豈雎仇魏齊得其首之為重平原入秦而不出之關之為輕也乎魯仲連傳新垣衍曰吾請出不敢復言帝秦秦将聞之為却軍五十里連衍互言帝秦而衍為連絀吾以秦将聞之怒而進軍則有之矣今反却者何與至聊城之将遺書自刎田单遂屠聊城此燕齊之大事也田車之戰功也何以考之燕世家及田单𫝊均亦無是事也聶政傳政姊榮伏尸哭極哀曰政自棄于市販之間者幸老母無恙妾未嫁也親既以天年下世妾已嫁夫嚴仲子乃察吾弟困汚之中而交之澤厚矣乃呼天於邑而死俠累被刺韓之搆其主使也亟矣政之毀面使人不識者不特全仲子且以全姊也姊惡弟之沒其名乃哭其尸而暴之使天下後世之知有聶政也又懼已身之罹於法而不如死也則榮亦烈矣若曰嚴仲子察吾弟而明告之使韓知之奈仲子何榮應不出此也考之韓史原無所為俠累與嚴仲子也不過妄言之而妄聽之耳然使榮死而出仲子也不幾冺聶政任俠之心且虗仲子禮政之意而榮亦徒死也與張耳陳餘傳陳餘怒解印綬予張耳起如厠張耳佩其印收其麾下陳餘獨與麾下所善數百人之河上澤中漁獵由此張耳陳餘有郤秦亂之際諸将蜂起各将其士非如上有天子惟視印所歸也况一如厠之頃張耳即能安衆心而服麾下乎即陳餘之将卒亦必視餘之舉動而不肯以一如厠頃而即為所收也至與麾下去而漁獵将示終身不復将兵乎将舍是而更有士卒乎封以南皮三縣與張耳等餘尤大怒今乃甘心舍是而漁獵乎陳豨傳上自擊東垣不下卒罵上東垣降卒罵者斬之不罵者黥之東垣衆卒要非素面若曰罵上而盡坑之可也若曰别其罵不罵而斬黥之則有難乎其别者人其肯自認曰我向罵哉朱建傳建事黥布布欲反平原君朱建止之不聽而聽梁父侯遂反漢已誅布聞建諫得不誅語在黥布語中按黥布𫝊布幸姬數如醫家醫家與中大夫賁赫對門赫厚餽遺姬姬侍王譽赫王疑其與私赫恐告變上使人徵驗布遂族赫家發兵反未嘗有梁父侯也未聞有朱建之諫也今云在黥布語中者何與酈食其傳酈生謂騎士若見沛公曰臣里中有酈生年六十餘人皆謂之狂生沛公至髙陽𫝊舍召酈生入謁沛公方倨牀洗足見之初沛公引兵過陳留酈生踵軍門上謁曰髙陽賤民使者出謝酈生按劍瞋目曰吾髙陽酒徒也使者復入報曰客天下壯士也沛公遽雪足仗矛曰延客入酈生雖曰辯士謁上之時必有定稱而始延之入今曰狂生又曰賤民酒徒而上之見之也一曰使兩女子洗足一曰雪足仗矛吾其誰從也與或曰後乃褚先生之所補也褚又何所聞而為此異詞哉孟子荀卿列傳荀卿之與孟子爝火之同皎日也荀卿者李斯韓非之師非斯之焚書滅學至今日而禮樂淪亡幾使二氏異端並為三教者皆非斯之罪而實非斯之本荀卿也安得與吾孟子距楊墨邪說者之可同年語哉至云天下方務合從連衡以攻伐為賢孟子乃述唐虞三代之徳是以所如不合退而與萬章之徒序詩書述仲尼之意作孟子七篇未嘗不知之也且唐虞三代之徳荀卿知之乎更以騶忌騶衍與夫淳于髠愼到等亦列之一𫝊遷可謂不知類矣荀子性惡而孟子性善是荀子早已外於聖人之教至騶衍之言大類佛氏南贍西牛之荒而曰見尊禮如此豈與夫子菜色陳蔡孟氏困于齊梁者同哉又自騶衍與齊之稷下先生如淳于髠愼到環淵接子田駢騶奭之徒各著書言治亂之事以干世主豈可勝道遷未嘗不知尊孟子也而與荀卿軰同𫝊者何哉豈漢儒淺陋謂孟子不過荀卿流乎至遷言退與萬章之徒作孟子七篇晁氏謂趙岐之言亦然韓昌黎曰弟子所集今考孟子所見諸侯皆稱諡如齊宣梁惠滕文蓋死而後諡者也諸王公死于孟子之前未可知也至魯平公者自惠王元年至魯平卒年凡七十七年孟子見梁惠之時已稱叟矣决不及平公之卒也則後人所集是也韓子之言是也趙氏曰孟子凡二百六十一章三萬六千四百八十五字韓信傳漢王出成臯東渡河宿修武𫝊舍晨自稱漢使馳入趙壁張耳韓信未起即其臥内奪其印符以麾召諸将易置之信耳起乃知漢王來大驚細柳之營天子先驅不得入况漢使而即馳入壁乎入壁猶可而印符在将軍之肘腋可易奪乎夫亦從誰手而奪之乎即或奪之亦必親奪之信耳也又胡為起而知漢王始驚乎况麾召諸將而易置之為時亦少間矣豈信耳聽漢使之奪符印而猶偃仰髙臥待易置畢而始起視乎倘項王詐稱漢使入壁信耳之頭不且入羽囊乎且諸将不見信耳忽有他人坐其上而易置之能無譁乎左右不得其解呂不韋傳邯鄲姬至大期時生子政註曰人十月生此過二月曰大期譙周曰姙身十四月生者非人能為之也人心欲速亡秦而駕詞以為先六國而亡也十二月而始生政似非不韋之子矣史遷曰知有身姬自匿有身之說從何見之哉衛青傳青父鄭季給事平陽侯家與侯妾衛媪通生青媪次女少兒即霍去病母青之姊霍仲孺給事主家與少兒通生去病外戚世家褚先生曰平陽主寡議長安中列侯可為夫者皆言大将軍可主笑曰此出吾家常使令騎從我出入耳奈何用為夫乎左右曰今大将軍富貴振動天下主何以易之乎于是主乃許之漢之無禮一至此乎公主不特夫其奴抑且姑其婢矣至武帝既通西域以江都王建女細君為公主妻烏孫王昆莫為右夫人昆莫年老公主悲愁昆莫使其孫岑娶尚之後公主死漢復以楚王戊之孫解憂為公主妻岑娶娶死以國與季父肥王肥王復尚楚主肥王死岑娶之子泥靡為昆彌復尚楚主此兩主者一為人之祖母而復為孫之妻一既以兄之嫂為叔之妻而又復為子之妻與平陽公主之以奴為夫以婢為姑而王昭君之為子妻而生二女者何異又何怪乎明之三娘子以外孫女而為外大父之妻又妻其子又妻其孫之如此哉然而非其罪也婁敬實為戎首李廣傳廣出獵見草中石以為虎射之中石没鏃一作没羽没羽非也没鏃是也鏃金可没也羽附木者也木不能附金以入石也李陵傳單于以兵八萬圍陵陵軍五千人兵矢既盡士卒死者過半而所殺匈奴亦萬餘人且引且戰連鬭八日兵圍八萬而以五千當之是一敵其十八矣然兵矢既盡以何砍擊所殺萬餘似渉空文矧且引且戰計無遑于飲食連鬭八日命何得以生全思欲過誇陵勇以明陵非戰之罪耳不知適所以誕也袁盎傳盎曰淮南有三子唯在陛下耳于是文帝立其三子為王淮南厲王𫝊孝文八年淮南厲王有子四人皆七八歲乃封子安為阜陵侯勃為安陽侯賜為周陽侯良為東成侯孝文十六年乃立安為淮南王勃為衡山王賜為廬江王良前薨無後賜盎諫帝而封淮南之子雖曰諫亦封不諫亦封然不可謂非盎力也然封其四子為侯則有之封其三子為王則非也四子為侯封于厲王之薨年三子為王封于孝文之十六年間九年矣今竟曰立其三子為王歸功專美于盎𫝊則得之矣奈厲王之本傳何酷吏傳郅都為中郎将從入上林賈姬如厠野彘卒入厠上目郅都都不行上自欲持兵救賈姬郅都諫曰亡一姬復一姬進天下所少寜賈姬等乎陛下縱自輕奈宗廟太后何袁盎𫝊帝從覇陵上欲西馳下峻阪中郎将袁盎曰陛下騁六飛馳下峻山馬驚車敗陛下縱自輕奈宗廟太后何上林游獵之苑衛士不知其幾許也豈上與賈姬郅都三人俱乎目郅都不行上乃即欲自持兵乎况賈姬一出别館離宫次舍又不知幾許矣樂毅報燕惠王書云厠之賔客之中則厠為旁舍也而謂姬獨入且使野彘得隨之乎亦誕甚矣且中郎将郅都之言又何其似中郎将袁盎之言也滑稽傳淳于髠說齊王以隠曰國中有大鳥止王之庭三年不蜚又不鳴王知此鳥何也王曰不蜚則已一蜚冲天不鳴則已一鳴驚人乃朝諸縣令長語在田完世家田完世家齊威王九年國人不治封即墨大夫烹阿大夫騶忌以鼓琴見威王三月而受相印淳于髠曰是人者吾與之㣲言五其應我若響之應聲必封不久矣楚世家楚莊王三年不出號令日夜為樂左抱鄭姬右抱越女坐鐘鼓之間伍舉曰願有進隠曰有鳥在于阜三年不蜚不鳴是何鳥也莊王曰三年不蜚蜚将冲天三年不鳴鳴将驚人乃罷淫樂聽政誅數百人進數百人按田完世家有威王而無好淫有淳于而無隠諫今曰語在田完者何與唯楚莊王有鄭姬越女之淫有伍舉不蜚不鳴之諫非威王也非淳于也齊威元年後于楚莊元年二百三十二年淳于乃齊威之臣優孟謂楚莊之人滑稽傳云淳于髠後百餘年有優孟優孟以談笑諫楚莊王是以齊威而反前楚莊矣夫既齊威可以前楚莊又何不可以楚莊之事屬之齊威乎前後彼此一任錯綜眞可謂滑稽矣威王八年楚大發兵加齊使髠之趙請救蓋齎黄金千鎰白璧十雙車馬百駟事趙趙與精兵十萬革車千乘楚聞之夜引去田完世家威王六年魯伐我入陽關晉伐我至博陵七年衛伐我取薛陵九年趙伐我取甄楚兵加我誠非細故師聞而遁豈無明文今乃敬仲世家缺而不録滑稽一𫝊獨紀其事者何與莊王置酒優孟前為壽莊王大驚以為孫叔敖復生欲以為相孟曰請歸而謀諸婦計之三日而為相莊王許之愛敖心切憐及衣冠舉國聽之理所未有史通曰人心不同有如其面故窳隆異等修短殊姿非由倣效俾有遷革如優孟之象孫叔敖也衣冠談說容或亂眞眉目口鼻如何取類而楚王左右曽無疑惑者耶昔陳焦既亡累年而活秦諜從縊六日而生遂使竹帛顯書今古稱怪况叔敖之没時日已久楚王即謂其復生也先當詰其枯骨再肉所由合棺重開所以豈有片言不接一見無疑遽欲加以寵榮復其禄位豈非夢中行事哉相如傳相如之臨卭從車騎雍容閒雅甚都文君夜亡奔乃與馳歸家徒四壁立車騎雍容状甚富饒家徒壁立貧又無聊何也矧相如身非一介早已服官駟馬髙車題橋有志者也今乃犢鼻當壚賤同厮飬豈圖卓氏之金錢遂不惜卑汚之若此耶當不然矣龜䇿傳漁者豫且舉網而得神龜龜自見夢于楚元王元王召衛平告以夢得龜王欲放之江衛平諫留剝之以為國寳神龜可寶貴以前知出使不免于豫且之籠見夢而自投于衛平之剝龜之不神可知矣乃曰匹夫得我為人君又曰戰勝攻取莫如元王龜之力也廢人聽龜後德先物亦云倍矣天官書在斗魁中貴人之牢天牢六星臨於魁外者也天理四星在於魁中者也理非理刑之理乃天理人情之理也故在斗魁之中以為運行佐理之主今以天理之理訛理刑之理而曰貴人之牢非也有句圜十五星屬杓曰賤人之牢賤人之牢貫索也在天市垣之上句圜九星耳無所為十五星也貫索近大角之間故曰屬杓也旁三星三公或曰子屬帝星前一星曰太子後二星曰庶子后非旁三星也亦非三公也曰子屬是也後句四星末大星正妃餘三星后宫之屬句者勾陳也後句四星餘三星者句陳六星并天皇大帝一星也句陳第三星最大為大帝之正妃非末星也前直列斗口三星隨北端兌若見若不見曰隂徳或曰天乙隂徳二星在垣内帝星之右者也天乙與太乙共二星在玉衡之間者也以隂徳為天乙非也以二星為三星又非也至曰直列斗口隨北端兌更非也直列斗口之星上輔少尉也東北曲十二星曰旗旗中四星曰天市天市垣左右之星曰旗共二十二國非十二也十二之上當脱去二字也至左旗九星右旗九星亦非十二星也至于四星天市並無是名當即市樓六星謂之天市耳然又以六言四不合何也其南北兩大星曰南門南門二星在庫樓之南東西横列未嘗南北列也唯平星二星南北斜列而星亦不大衡太㣲三光之庭匡衛十二星藩臣西将東相南四星執法太㣲垣左右将相共八星非十二星也左右執法共二星非四星也西将東相之名亦非門内六星諸侯垣内五諸侯五星非六星廷藩西有隋星五曰少㣲士大夫隋者其形圓而匾也今垣西四星南北列曰少㣲非五星而隋形也其旁有一小星曰長沙軫中有小星曰長沙非旁也危東六星兩兩相比曰司空虗東危西有兩兩相比者曰司命司禄司危司非之八星室上有兩兩相比者離宫六星並無兩兩相比于危東之六星也至曰司空亦止危上二星曰土公吏亦無六星之司空也軫之下有二星曰上司空亦無六星之司空也旁有八星絶漢曰天潢天潢旁江星江星動人渉水王良西有九星如弓形絶漢曰天津非八星也天江四星在尾宿之上與天津天潢毫不相渉今曰旁江星非也歲行左行在寅歲隂右轉居丑歲隂在卯星居子歲隂在未星居申以六月與參晨出今康熙辛未星居酉六月與婁俱出年與星俱差一宫晨出之星差二宫矣嵗行嵗隂之說不可據也史記疑問卷下
