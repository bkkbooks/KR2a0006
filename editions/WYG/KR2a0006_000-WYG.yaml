body:
  text: 史記疑問正史類提要臣等謹案史記疑問三卷國朝邵泰衢撰泰衢有檀弓疑問等書已著録史記採衆説以成書徴引浩博不免牴牾班固嘗議其宗㫖之乖劉知幾頗摘其體例之謬至其叙述之罅漏先儒雖往往疑之而未有専著一書抉其疎舛者泰衢獨旁引異同而一一斷之以理如謂髙祖紀解縱罪人坦然回沛之非情實留侯世家諸將偶語沙中之不可信李陵𫝊兵矢既盡尚殺匈奴萬餘人之言為誇誕據功臣表漢九年吕澤已死而駁留侯世家所紀漢十一年不應又有吕澤大抵皆叅互審勘得其間隙故所論多精確不移洵足袪讀史之惑不但如呉縝之糾新唐書祇求諸字句間也是書本與所作檀弓疑問合為一編今以檀弓疑問入經部而是書析入史部俾各從其類焉乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:66f307d735ca80e7d2e7b53a0c0ca29b909bcae5228cef3cd7f3df18c54bf06a
