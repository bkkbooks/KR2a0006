body:
  text: 史記疑問卷上欽天監左監副邵泰衢撰焚書以後古史無徵幸遷之記得以傳述史通謂其多雜舊聞時採異說或違經𫝊與理不符互見瑕瑜每竒豪富致使愚者𫝊訛雅人遺誚不可謂非白圭之玷也班氏曰甚多疏略或有抵牾先黃老退處士羞貧賤其是非頗謬于聖人余覽其言敢舉其違經繆理疏略抵牾之處以為疑問兼集先儒之說著于篇淺識鄙見匪敢問人聊遣長日以自怡云爾三皇紀王母曰華胥履大人跡于雷澤而生庖犧蛇身人首女媧氏蛇身人首與祝融戰頭觸不周山崩天柱折地維缺女媧乃煉五色石以補天斷鰲足以立四極聚蘆灰以止滔水以濟冀州于是地平天成少典氏感神龍而生炎帝人身牛首庖犧近取諸身逺取諸物以通神明之德以類萬物之情始畫八卦神農氏耒耨之用以教萬人日中為市交易而退此聖人之始祖也夫豈不類人形體同獸畜其何以君臨畿甸綏撫萬民乎至煉石補天輕清從何登躋鰲足立極餘體向何安置蓋共工俶擾天紀綱常幾絶女媧滅之四土復正萬民更生此所謂補天立極地平天成也然雖喻言實同誕鄙馬貞補入殊屬贅瘤况山崩柱折三皇萬歲乘雲車駕六羽益附㑹不經矣至履跡感龍蓋惑于履帝武敏歆交龍于媪上孕産漢髙之謬也男女搆精萬物化生人交成人獸交成獸安有異物交人而生人之理若是則契非嚳子燕父而人母矣髙帝非太公子龍父而人母矣賤人貴畜而曰龍厭常喜新而曰大人跡有母無父豈常經哉古者立郊禖𤣥鳥至之日太牢祀之天子親往后率嬪御以從乃𤣥鳥至而祀以生商有天命也故曰天命𤣥鳥降而生商安得曰吞􅜈卵乎姜嫄隨帝之後武以祭于郊禖故履帝武而上帝居歆之敏速也生而棄之者蓋生産每苦其不達而難也今也先生如達矣生産者必坼副有災害也今也不坼不副而無災害矣居然生子異于常人之生此所以棄也豈履大人跡之謂哉今以伏羲生于大人之跡神農生于感龍之神是欲以異尊聖而不知其誣聖之甚也將以聖人為非類與五帝紀軒轅之時神農氏世衰諸侯相侵伐神農氏勿能征軒轅乃習用干戈以征不享諸侯咸來賔從而蚩尤最為暴莫能伐炎帝欲侵陵諸侯諸侯咸歸軒轅軒轅乃教羆熊貔貅貙虎以與炎帝戰于阪泉之野三戰然後得其志與蚩尤戰于涿鹿之野乃禽殺蚩尤而諸侯咸尊軒轅為天子是為黃帝以師兵營衛史載黃帝在位百載崩年百有一十是十有一齡即登帝阼矣弱齡童稚雖習干戈安能敵强諸侯而使之賔從又安能敵最暴之蚩尤而禽誅之尤可異者黃帝阪泉之戰也是奪神農氏之天下而有之三戰後得志炎帝雖欲侵陵諸侯未必有桀紂之矯誣上天沉酒冒色也則此得志也者其亦異于南巢牧野之師矣况黃帝者易所稱垂衣裳而天下治者也夫豈以軍旅自衛而以武得志者哉涿鹿阪泉固難稽測習用干戈三戰得志殆事屬無徵者乎黃帝崩葬橋山世俗有鼎湖之說史遷不載蓋知其妄也程子曰世之好怪也聖人與人同類也故形同而氣同而知識同也相君長者類也相使者形也相管攝者氣也相維持者知識也龍與鼎異類也形氣之不同也曷足以感召而使之耶太古之聖有曲言以範俗者假之喻也𫝊久而詭僞生焉唯智者其正之耳黃帝之治天下也上下與天地同流百神之宗也故曰百神受職于廷采銅者剛中也登首山者髙明也爐火者鼓萬物之化也神鼎者享帝飬賢之物也上水而下火者二氣升降而既濟也羣龍者乾也雲者從龍之物也黃帝乃乾九五飛龍之大人也羣小臣之攀胡䫇者利見之象也至于弓裘衣冠者黃帝垂衣裳而天下治也世好譎怪以為輕舉也希寵之臣又從而逢世之君乃甘心于黃帝矣不知生而少壯轉而衰老而死亡人之大常聖賢之大共如終始消息之不可以幸免茍大圓之上有聖人居之則聖亦多矣恐不能容臺榭纍纍如是之多也因史葬橋山而特附其說與世明之帝摯立不善崩不善者微弱不著也帝王紀曰摯乃致禪若云不善而崩則不得云禪史而曰崩豫將何從窮蟬父曰帝顓頊顓頊父曰昌意以至舜七世矣自窮蟬以至帝舜皆微為庶人昌意者黃帝之子皇英乃軒轅五世之女舜乃軒轅八世之孫堯舜人倫之宗以孫娶祖瀆禮亂常又何觀厥刑善其婦禮為哉窮蟬既為帝子又何以微為庶人一也男女辨姓婚姻不通舜為堯之五世從孫而可以尚曽祖姑哉二也帝王之姓纍世不易唯舜之姓非先王之姓三也舜為堯之從孫禹為舜之從祖仍一家而祖孫授受也謂之揖讓謂之公天下可乎蓋堯以至公授異姓在下之鰥故曰𫝊賢舜以天下𫝊外姓有功之賢故曰巽位夏本紀曰鯀父顓頊又云自黃帝至舜禹皆同姓而異國號之皆非矣四也若言鯀弟蟬兄本之顓頊一體夫何鯀則始生禹子蟬遂逺歷五𫝊且舜年長禹二十揆諸年世甚為懸絶况舜生冀地非昌意降居若水之方必非頊後史辨之矣至堯用元愷不以為舉舜以非親故謂之舉五也舜茍堯親非側微矣惟其側微而必本嶽薦然後舉之歷試之而朝野信之然後授之六也至受終文祖者受天下于人必告其人所從受者文祖者堯之太祖也祖堯之祖以明受之堯也非祖考本生之祖也禹之受命于文宗曰堯廟又推舜所自受之堯也顓頊豈虞氏之祖哉堯以二女妻舜以觀其內使九男與處以觀其外二女事舜親戚甚有婦道堯九男皆益篤耕讓畔漁讓居瞽瞍尚復欲殺之焚廪以兩笠自扞而下實井從匿空出去嶽曰父頑母嚚象傲克諧以孝蒸蒸乂不格姦帝曰我其試哉釐降二女于溈汭嬪于虞夫以諧孝蒸乂乃始釐降嬪虞不過二女與處試其刑于式化耳若使瞽瞍復欲殺之又何克諧不格姦之有余以讓畔讓居宜在釐降之先若已女妻男處而瞽不為奸大似詔尊奉勢之流歸之德化詞屬未安而萬章有二嫂治棲之文又似殺舜在釐降後然塗廪之時兩笠從何而辦穿井之時井實從何匿空似皆未喻者也八元八愷世濟其美不隕其名堯不能舉四凶堯不能去禹臯陶后稷伯夷䕫龍垂益彭祖自堯時皆舉用未有分職唯天為大唯堯則之誰謂舉措人才堯猶不克哉靜言庸違丹朱嚚訟知之深矣舜之受終正代堯之有終也誅凶分職皆禀申堯命而已堯以不得舜為憂耳賢不能舉凶不能去得人而又不能分職大哉為君之謂何路史曰久抑元愷則克明峻德為虗言長庇四凶則百姓昭明為妄語此言誠然舜薦禹于天十七年南巡狩崩于蒼梧之野葬于江南九疑是謂零陵禹受命于神宗之日舜年九十五矣耄期倦于勤今乃百有十歲猶自躬巡荒服乎舜典云舜生三十徵庸三十在位五十載陟方乃死史官紀舜典之總結從生至死也姚舜牧氏曰升遐死之别名也若以陟方為升遐又云乃死史何其復也史紀舜生始末曰舜三十徵庸則前之祗載克諧也及受終三十載允陟五十載為天地立心為生民立命為萬世開太平而不敢自暇豫也至于若時五十載而巡歷于方嶽之下也如此乃死焉自生至死乃字始明何得云巡狩而死于蒼梧之野乎史且言其葬江南九疑是謂零陵不考之如是乎孟子曰卒于鳴條桀走鳴條即今之山西安邑縣也九疑之說殆不足信路史言之甚詳禹紀帝禹東巡狩至㑹稽而崩㑹稽者㑹計也哀七年𫝊景伯曰禹合諸侯于塗山注塗山在壽春縣東北濠州鍾離縣西九十五里是塗山者壽春之塗山今訛蕭山之㑹稽皆世家致羣神于㑹稽與㑹計之一語耳蓋㑹稽越地上古未通仲雍逃吳猶然斷髮即使㑹朝述職何為逺抵蠻方若云封德爵功又不當近舍朝寧宋景濓云稽之左氏當以壽春之塗山為正禹傷先人父鯀功之不成受誅乃勞身焦思居外十三年書曰無若丹朱敖唯慢遊是好豫創若時娶于塗山辛壬癸甲啓呱呱而泣豫弗子惟荒度土功蓋禹勸帝修德而以敖為可畏不可不創娶妻弗顧生子弗恤而唯荒度土功弼成五服未嘗創于鯀也若以為創于鯀而痛父功不成亦可為幹蠱之孝不知禹之地平天成萬邦作乂者豈以是哉蓋禹功當世而有天下稷播榖而篤生文武周公𫝊道于天下後世而有天下契敷五教生湯以有天下篤生孔子𫝊道萬世至淑問如臯陶而其子伯翳秦趙皆其後也秦自平王封襄公為侯享國三十世而始皇混一天下唐之李姓刑官之司李也宋之趙姓臯陶之裔也孰謂明刑弼教之絶世而不有天下哉唯益不有天下者雖有烈澤之功當禹薦益之時史云益之佐禹日淺天下未洽且艱食鮮食之時皆佐禹成功而禹之功大也故因禹而并附其說焉劉纍學擾龍于豢龍氏以事孔甲變化不測之為龍非牛馬之可豢也畜牛以欄牧馬以廏豢龍心當以江海矣江海可以赴蹈而擾之乎且學擾者必先得龍龍不可得安從學哉竹書曰夏孔甲元年廢豕韋氏使劉纍豢龍蓋非豢飬其龍也豢龍者豢龍氏乃諸侯之氏族如豕韋氏也曰使劉纍豢龍者命劉纍為豢龍氏也今曰學擾龍于豢龍氏以事孔甲何哉曰賜之姓曰御龍氏受豕韋之後者是也殷紀阿衡欲干湯而無由乃為有莘氏媵臣負鼎爼以滋味說湯三聘迎五反然後肯往割烹孟子辨之詳矣此又曰干曰媵臣負爼不足深置喙也夫既曰干湯負爼又何俟聘迎五反哉前何其卑屈後何其崖岸與湯伐三㚇俘厥寶玉伐夏救民者湯也夫豈若俘貨者為哉仲虺之誥曰惟王不邇聲色不殖貨利豈虗語哉作湯誓于是湯曰吾甚武曰武王桀敗于有娀之墟奔于鳴條湯誓曰非台小子敢行稱亂有夏多罪天命殛之豫畏上帝不敢不正今曰吾甚武曰武王是敢行稱亂非不敢不正也附湯七年旱史無其文金罍子曰禱七年而雨耶旱七年而禱耶禱七年而始雨天棄湯也旱七年而始禱湯其可為湯耶七年大旱始有省過之詞一禱而應即有象成之樂湯為何如之湯乎况七年大旱煎沙爛石百榖烏得遺種生民烏有遺育至云以人禱者亡國之妖言也一鄴吏能言之而湯不如一鄴吏耶聖人修德以回天未聞躬作犧牲而可以應天也湯豈躬為不情之禱以欺天耶况天之厯數在躬亶聰明作元后而一為犧牲可以膺厯數而四海不困窮乎或一時之旱湯躬自省禱于桑林則可若旱七年而犧其身以禱而天始應鄉黨自好者不為而矯誣若是與既勝夏欲遷其社不可作夏社仲虺之誥曰纘禹舊服奉若天命湯誥曰王歸自克夏至于亳伊訓曰古有夏先后方懋厥德于其子孫弗率皇天降災是湯之弔民伐罪放桀而已夏禹何罪而滅其社乎伊尹作咸有一德湯乃改正朔書咸有一德云伊尹既復政厥辟將告歸乃陳戒于德是復政于太甲而作也今于克夏作湯誥之後其然乎伊尹放太甲于桐宫三年伊尹攝行政當國以朝諸侯攝王之事周公之所無也禮記明堂位之僞也當國朝諸侯伊尹之所無也書經太甲之可徵也蓋周公之朝則抱冲子而太甲居桐乃宅憂耳古者君薨太子諒暗百官總已以聽于冢宰蓋父母之喪至痛而庶事之可委者悉委之不唯天子然也國君亦各有攝痛均故也伊訓曰惟元祀十有二月太甲始居隂十二月為正朔殷建丑也伊尹祠于先王奉嗣王祗見厥祖惟嗣王不惠于阿衡狎于弗順營于桐宫密邇先王其訓無俾世迷王徂桐宫宅憂克終厥德非廢也因其居憂使之逺邪小而邇先王以啓其憤悱之心耳惟三祀十有二月朔伊尹以冕服奉嗣王歸于亳是三年居憂之終期諒隂既畢向以喪服居桐今除喪而以冕服迎之非再立也始曰太甲今曰嗣王而見厥祖之時亦曰嗣王夫既為嗣王尹得而廢之哉使之居桐尹之專也故曰放尹曷嘗當國以朝諸侯哉攝行政則有之耳以伊訓始以咸有一德終嗣王曰尚賴匡救之德圖維厥終尹曰愼終于始而陳戒于德以告歸曰君罔以辨言亂舊政臣罔以寵利居成功戒君若臣其心為何如哉周紀太伯虞仲亡如荆蠻斷髮文身以讓季歷哀七年𫝊子貢曰太伯端委以治周禮仲雍嗣之斷髮文身裸以為飾注曰仲雍始效吳俗以避災害是太伯亡時尚端章委冠以治岐周之禮仲雍嗣立始斷髮文身以效吳楚之俗也今曰伯仲文身示不復用遂若伯仲之逃情非得已者此文身斷髮禍避申生之誹議史通所由生也乃獻洛西之地以請紂去炮烙之刑崇侯譖西伯故紂囚西伯于羑里譖之言曰積善纍德諸侯皆向之將不利于帝而帝囚之也今請解炮烙之刑是益徵善德而顯不利之實矣西伯戡黎而祖伊為之恐今請解刑其能免哉况太師少師從容燕語之所不得于紂者而以羑里之囚能之乎况紂醢九侯脯鄂侯而文王不過竊嘆且致囚矣今請除炮烙而紂竟相從也何哉司馬溫公曰是正中崇虎侯之譖者是也故如韓非馬遷之言不特請不行且如束煴灌膏以救火矣况當是時尺地莫非紂有即洛西之地亦紂地也文王又安從得此地以為私有而獻之乎蓋三分天下之有二者豈如今日之為郡縣哉不過諸侯之賔服而奉之者有其二耳豈真有天下之地三分其二而據之是文王無洛西千里之地明矣呂氏春秋曰文王處岐事紂寃侮雅遜朝夕必時上貢必適祭祀必敬紂喜命文王稱西伯賜之千里之地文王辭願為民請炮烙之刑此言庶乎近之殷紀西伯歸乃隂修德行善諸侯多叛紂而往歸西伯西伯滋大紂由是稍失權重武王率諸侯伐紂紂衣其寶玉赴火而死武王斬紂頭懸之太白殺妲已周本紀云紂嬖妾二女皆經自殺武王斬以𤣥鉞懸之小白齊世家呂尚以漁釣奸西伯西伯獵遇太公于渭之陽曰吾太公望子久矣或曰西伯拘羑里散宜生閎夭素知而招呂尚為西伯求美女竒物獻之紂西伯歸與尚隂謀修德以傾商政周之隂權皆宗太公其二歸周者太公之謀計居多武王與天下更始師尚父謀居多隂謀則人臣而將矣况曰傾乎謀計則仁義鮮矣况曰多乎美女之獻已纍聖德失權滋大服事云何至武之伐紂永清四海而已以己焚之枯骨復受黃鉞之誅以己經之嬖妾更有懸旗之慘害義傷教誣聖實甚至妲已而曰殺曰經不符太公而曰奸曰遇曰招互異路史駮之誠亦有見于此太公封于齊乃齊之太公也如田和之為齊太公是也曰周公旦曰召公奭以名配爵號而稱者也曰吾太公望子久矣故名之曰太公望試問誰為太公且望之欲何為也豈文王萌不臣之念而古公亶父久有圖殷之望于是呂尚乃為伐紂之舉而出非聞文王之善飬老而來歸者乎殆非服事至德之心也蓋太公者大賢也孟子所謂見而知之者也居東海而來歸者也今曰奸西伯以美女竒物獻紂隂謀以傾商政周之隂權皆宗太公噫太公何至譎詭為憸人舉如是哉閭閻之子愛其君者必有道矣公之所學者王道所事者聖人况大老來歸其子焉往而後先疏附之莫不有其才也孰謂太公猶伏漁以待獵乎且太公之漁也有意于天下乎無意于天下乎有意則文王興而自當歸矣無意則鑿壞而遁文王其能載而師之乎且既曰畋得之矣又曰四子于𨼆所相與見西伯于羑里矛盾如此况武王曰豫有亂臣十人太公在焉則太公為武王臣而未嘗為文王師也詩曰惟師尚父者乃師中之師易所謂文人是也尚者公之字也父者禮之所謂某甫也天子而以父為臣乎臣居然稱父而仍臣列乎學訟以脫人之囚隂謀以傾人之國儀秦輩之詭也曽太公而若是至所謂六韜者非真太公之書蓋雜出于戰國用兵者之邪說楚漢之際好事者之所為也君子可不審取而讕說之是狥耶附澤及枯骨王政飬生送死無憾力之所及者比使之相保族使之相葬又安有不衣冠之殣骨乎呂覽曰抇池得死人骸而更葬之曰有天下者天下之主也此仁之微者耳烏足為文王重哉賈氏新書曰夢曰我東北之槁骨也速以王禮葬我而文王以人君禮葬之噫文王于夢中而以王禮許人醒而踐夢以王禮葬槁骨文王之迷于夢而疏于禮一至是哉是阿鬼以不正之封而罔民以非義之信也抇池得骸而始為之主以更葬之不及見者未必不多也以是為仁吾恐文王之仁不如是之小也為文王木主載于車中自稱太子發言奉文王以伐不敢自專古之征伐必載祖主社主以行所謂賞于祖僇于社也此所以載文王之木主也至自稱太子發泰誓曰肆豫小子發未聞稱太子也自稱太子不嫌于專乎武王渡河白魚入舟火流為烏此河內女子之僞泰誓也壁經出而其妄破矣史遷采之不過好異耳太師疵少師强抱其樂器而奔周宋世家微子乃持其祭器造于軍門肉袒面縛左牽羊右把茅膝行而前微子之去也父師詔曰王子出迪其志决矣所謂遜于荒者出遁荒野以自免耳古者同姓雖危不去國微子為紂兄固不得茍去而自靖人自獻于先王顧忍以先王重器適人哉况祭器置宗廟中微子敢無君而抱之以出司宗廟者其容之乎原其歸周之意惟欲為殷祀地不知成湯不廢禹祀武王寧肯遽絶湯祀乃背君蔑宗祗蒙面取辱耳仁人固如是乎且謀于二師而遜之之意何居遜者我不顧行遁耳豈叛商歸周之謀哉是微子歸周當在武庚叛誅之後周訪微子立之以存商祀故微子之命曰修其禮物作賔于王家則其非抱器歸周明矣至于面縛而又把茅牽羊則正義所云面縛是縛手于後故曰銜其璧也又安得左牽羊右把茅乎周紀曰太師疵少師强抱樂器奔周是伶官之屬非微子也而宋世家乃以微子持祭器不亦異乎武王初定未集使其弟管叔鮮蔡叔度相祿父治殷武王至周不寐曰我未定天保何暇寐悉求夫惡貶從殷王受武王病天下未集羣公懼武成曰惟九年大統未集豫小子其承厥志垂拱而天下治按此則向之未集今已集矣何終武世而尚未集哉至欲悉求不順罪並殷王孰謂武王聖德竟等秦暴之坑誅哉二神龍止于夏帝庭卜請其漦而藏之吉龍亡而漦在櫝夏亡𫝊此器殷殷亡又𫝊此器周比三代莫敢發三代建都異地且經逺歷千年寶鼎尚難稽問矧茲木櫝漦函既非𫝊世重珍何為藏勿敢發卜云其吉竟得亡周之姒𤣥黿新化觸非宜孕之人吐沫幾何千年始變七齡童妾難與黿交左右思之殊增迷惑褒姒不好笑幽王為烽燧大鼓有寇至則舉烽火諸侯悉至至而無寇褒姒大笑邦畿軍警烽火為徵諸侯各君其國途程逺邇不同必集衆帥師整戈束甲夫豈一呼即至姒從市樓觀乎况師行三十里吉行五十里勤王兵至而城門不閉士卒不驚亦必釋甲解戈入見天子姒豈堂前簾下笑語聲聞者乎附我百爾九十吾與爾三焉文王九十七而終武王九十三而終文王固聖然亦人耳何為自有其壽百年知武王之壽九十而又自損其三以與武王又何能自減其百而為九十七父子相揖讓而制其短長之命也如此更計之皇極經世載癸巳年周文王生己巳崩合九十七歲又十六年乙酉而武王崩是文之崩年武七十七矣蓋文王二十一歲而生武王也且有伯邑考之長子生子之蚤不足異也至武王之子成王尚在襁褓襁褓者二三歲之嬰稱也武豈九十而始生成王乎又何遲也而又有祭胙茅蔣凡伯魯公邢侯晉侯韓侯邘應狄孝伯之十二子豈武王九十以前竟無子九十以後而連舉十三子乎即曰成王立年少而有十三歲也亦武王八十而得子矣豈成王嫡而諸子庶乎武王元配計當亦八十矣安得更生子與鄭康成曰文王十三生伯邑考武王八十四生成王後又生唐叔虞何遲早之若是附卜年卜世書曰天難諶命靡常詩曰天命靡常此文武周公之訓也豈有預為歷世長久之說以數告子孫使子孫恃數而忽天命之理堯之𫝊舜舜之命禹皆以四海困窮天祿永終為戒伊訓曰爾惟不德罔大墜厥宗太甲曰無越厥命以自覆古聖皆然也右其卜而左其德豈君子之道乎故知王孫滿特假天命神告以拒其問鼎之心耳文武周公豈其然乎附剪桐封弟唐叔應封不剪桐而亦封也如不應封則雖有戲言而必不遂過也若成王為失禮之舉周公為遂過之教君臣胥失之矣其何以示天下柳宗元剪桐之辨得之秦紀大費𤣥孫曰孟戲仲衍鳥身人言帝大戊聞而卜之使御吉遂使御而妻之鳥身無手何以執綏即使俱全諒非人類為帝之御已不可况尚之主哉卜云其吉夫亦何吉之有穆王西狩樂而忘歸徐偃王作亂造父為穆王御一日千里以救亂又趙世家穆王西狩見西王母樂之忘歸而徐偃王反注曰徐偃王有筋而無骨又曰徐君宫人娠生卵棄之為犬鵠蒼銜歸成小兒其後鵠蒼犬死生角九尾實黃龍也王母何王之母西王何地之王本之大戴少間篇曰虞舜以天德嗣堯西王母獻其白玉琯故筆叢云西王母非婦人乃西方諸侯王名母者也後世遂誣為仙母而荒唐至今矣至卵為禽種今乃成兒犬而生角更增九尾真彼童而角實虹我小子乎至偃王有筋無骨何以坐立持兵况今古以還曽有人而無骨者乎至人非翼鳥安能一日千程即使造父稱神騄駬稱駿而車中人亦不能堪此一日千里之風馳電掣而奔也且天子行必有副車後乘豈能盡駕千里之馬抑豈可以一乘獨馳歸乎至以西王母為婦人者穆天子𫝊也安足信哉秦始皇臣請史官非秦紀皆燒之非博士官所職天下敢有藏詩書百家語者悉詣守尉雜燒之蕭何世家沛公至咸陽何獨先入收秦丞相御史府律令圖書項王屠燒咸陽而去始皇在位之三十四年焚書三十五年坑諸生兼并天下始九年耳非秦紀皆燒之則所燒者史書也非詩書經典也曰非博士官所職敢有藏詩書百家語者悉詣守尉雜燒之則所燒者天下民間所藏之書而博士之職守如故也則經書百家語特非博士不得藏耳故呂東萊曰所燒者天下書也博士所職自若也蕭何收圖籍而遺此惜哉是博士職如故也秦紀亦自若也計戊子焚書至甲午入關七年耳詩書尚未堙沒而老成尚多存也孰知沛公不好儒蕭何又刀筆吏止入丞相御史府收其山川形勢之圖官吏戶口之籍與夫刑法之律令制誥之文書而不及博士所藏之經書百家語且又不弛詩書之禁又不委曲于約法三章之時又不召老生宿儒以典其學以致羽入咸陽而博士所藏盡付一炬其後雖有髙堂伏生其人髙祖又未遑其事孝惠皆武力之臣孝文唯具官之博士而詩書之亡不在始皇而在李斯又不在項羽而實在漢髙之亭長蕭何之刀筆吏噫何固不足責張良又何為者與不知良亦黃老徒耳彼又烏知儒學而加之意哉然而焚書之禍其由來之漸當繆公之世由余入秦乃曰詩書禮樂法度為政中國所以為亂也邪說之作始矣至孝公而商鞅變法修刑此焚書之先聲也至荀卿著論欲人毋二後王而迂法先王其徒韓非李斯皆師事卿而非之言曰世之愚學不知治亂之情多誦先古之書以亂當世之治李斯介之入秦乃為滅學毀儒之說極本遡原由余衛鞅開其先而荀卿為之創韓非為之導而斯竟行之荀卿曷勝誅哉死于蘭陵幸矣始皇喪棺載輼凉車中抵九原㑹暑上輼車臭乃詔從官令車載一石鮑魚以亂臭秦始雖崩棺寧不愼即曰倉卒必不疏虞况欲逺達咸陽者哉今也始抵九原鮑魚亂臭事若齊桓烏足深信且穿及三泉水銀為海而肯草草一棺乎項羽紀項伯素善留侯夜馳私良呼與良俱去良要見沛公言願伯具言臣之不倍德項伯許諾復夜去以沛公言報項王項王許諾夜馳夜去軍事嚴且密也私良㑹沛漏師負重罪也猶敢以告項王乎使項王曰而何得見沛公伯敢曰余私良乎髙紀又云以文諭項羽羽乃止此又項伯以沛公言告項王何也雖古者軍有可入之理華元登子反之牀髙祖晨馳入趙壁之類是也然非所論于項伯也弒義帝羽不殺義帝沛公亦必殺之羽為沛公代之手而且為漢藉口使天下義之此羽之失也蓋韓彭之功猶不容况義帝名位之足以動天下者乎縱沛公能善處帝數年之間反者九起亦必有挾義帝以為名者而帝亦不能自安于漢矣故曰沛公必殺之也項羽聞沛公入咸陽大怒使當陽君擊關項羽至戲下兵四十萬屯新豐鴻門沛公軍十萬在霸上相去四十里沛公脫身獨騎與樊噲夏侯嬰靳彊紀信等四人從酈山下道芷陽間行謂張良曰從此道至吾軍不過二十里度我至軍中公乃入應劭曰霸上在長安東三十里古曰滋水秦繆更名曰霸霸上者霸水上也東至霸城十里即芷陽也文帝之霸陵也戲下戲水下也在新豐東北三十里又東北十七里為鴻門又十三里為戲水兩軍相屯自鴻門至新豐十七里新豐西五十五里為霸城又十里為霸水相去計七十七里若伯之夜馳夜去則一百五十四里矣沛公旦日往謝亦七十七里矣今曰相去四十里間道二十里者何也吾以為項伯私良沛公因具知之得以自解于羽旦日往謝羽增意終未釋也而良噲在側一智一勇恐倉卒未能得志且恐在坐之不免于噲也因賜之酒而遲之逮莊入舞劍沛乃間遁留良入謝增乃始悔不决而起撞玉斗耳若夫盾仆衛士按劍而跽伯蔽沛公至軍始入謝與伯之具告項王皆浮詞也范增數目項王舉所佩玉玦以示之者三項王默然不應不應者有所思也羽非不欲殺沛也殺之無名耳吾知范增召莊羽未嘗不心許也莊入為壽曰君王與沛公飲軍中無以為樂請以劍舞項王曰諾項莊拔劍起舞項伯亦拔劍起舞常以身翼蔽沛公項王曰諾心許莊也知增之令莊也伯何為者不令而起且翼蔽之乎蓋示王以變生倉卒從者之不肯甘心乎不然伯獨不畏增法乎至項伯黨敵人而滅宗國罪不容誅漢髙戮丁公以戒不忠而獨封項伯且賜姓劉氏何哉噲帶劍擁盾入衛士不內噲側其盾以撞衛士仆地噲入瞋目視項王項王按劍而跽曰客何為者軍中馳者死况撞仆衛士乎寧無守衛之將軍不搏執之尚容其入而瞋視致項王之按劍而跽乎矧項王一喝樓煩入壁豈區區一噲乃怯似小兒頓滅其叱咤之威按劍而跽乎羽增之欲殺沛懼無名也今也何難先執噲于轅門責仆衛士之無狀而沛公後之可也良噲不自危乎項王曰賜之彘肩則與一生彘肩噲覆盾按劍切而啖之曰臣死且不避巵酒安足辭夫秦王有虎狼之心沛公先破秦遣將守關而王聽細說欲誅有功之人竊為大王不取也項王未有以應曰坐彘肩自庖人來或自席上來也安得生者耶且二王相㑹末將輒敢肆言且曰竊為大王不取此時之項王未有以應此刻之亞父亦無一辭直俟沛公遁去而始曰不足與謀王怯增騃不應至是沛公起如厠招樊噲出令張良留謝曰度我至軍中公乃入沛公已去間至軍中張良入項王曰沛公安在良曰已至軍矣貴者張筵尚有司閽之報項王宴客乃任沛公之遁張良入謝始詢沛公如厠一頃手招樊噲形容想像殊類村莊項王使者來為太牢具舉欲進之見使者佯驚愕曰吾以為亞父使者更持去以惡食食項王使者髙祖紀豫陳平金四萬斤以間疏楚君臣于是項羽乃疑亞父乃怒辭老至彭城而死吕東萊曰項使為飲食之人可也不然平計甚易識也何云竒計哉且欲進驚訝更持去而以惡食食之又與以金間疏事相矛盾羽顧見呂馬童曰若非吾故人乎馬童面之指王翳曰此項王也王自刎翳取其頭餘騎爭項王相蹂踐相殺者數十人後楊喜吕馬童吕勝楊武各得其一體分其地為五封以侯髙祖紀羽敗而走灌嬰追殺項羽東城灌嬰𫝊所將卒五人共斬項籍餘騎爭項王矣則項尸已為餘騎所分最後之楊喜四人其又殺餘騎而奪之乎抑餘騎爭殺自盡尚留項尸為楊喜四人所得乎噫頭與四體共封五侯倘有得其五臟六腑者又可得十一侯矣奚必爭蹂踐乎為之一哂吕馬童面之者背之也羽既以馬童為故人馬童乃背面指示而假手于翳故人固如是乎雖然今之呂馬童必誘項王生擒以首功裂地而王矣背面之以指示他人其亦存古道也哉髙祖紀髙祖母曰劉媪息大澤之陂夢與神遇太公往視見蛟龍其上有身産髙祖龍交産祖謂是龍兒不知龍為獸類何得人交即使其事甚真亦同異類者矣太公冒名太上亦可謂無功矣單父人吕公善沛令沛中豪傑往賀蕭何令諸大夫曰進不滿千錢坐之堂下髙祖乃紿為喝曰賀錢萬實不持一錢謁入吕公大驚起迎之門坐上坐吕公既善沛令豪傑大夫皆往賀之既曰大夫則必爵位可稱斷非里中之厮飬也以一送徒警盜之亭長虛聲重喝主起迎門且賔上賔坐上坐哉老父相吕后曰夫人天下貴人邦君之妻曰夫人亭長何人輒當貴號至曰天下貴人不知貴能滅族至曰少竒此女不知女當滅吕相也云何髙祖為亭長乃以竹皮為冠令求盜之薛治之時時冠之及貴常冠所謂劉氏冠也服非其服者無赦先王所以易服色也今以區區之亭長乃制竹皮為冠既異時王之制寧無時王之法與髙祖以亭長為縣送徒驪山徒多道亡乃解縱所送徒曰公等皆去吾亦從此逝矣壯士願從者十餘人髙祖被酒夜經澤中有大蛇當徑乃前拔劍擊斬蛇始皇以東南有天子氣東游厭之髙祖自疑𨼆于芒碭山澤之間陳涉世家曰失期法當斬秦法失期尚斬無赦若曰解縱罪更何如今乃公然縱去曽無稽察之令丞坦然回沛尚多從游之壯士且銷兵之後猶然佩劍秦帝東游始𨼆芒碭白帝赤帝之訛亦如白魚火烏之僞而已五年與項羽决勝垓下淮隂侯將三十萬自當之孔將軍居左費將軍居右皇帝在後是年漢高未帝韓信已王豈追書人臣則從輕人主則從重乎方回曰此豈史遷信筆乎髙祖欲長都洛陽齊人劉敬說上及留侯勸上入都關中髙祖是日駕入都關中張良世家六年劉敬說髙帝都關中劉敬𫝊五年說上都關中五年六年紀𫝊互異吾以為六年是也六年十二月僞游雲夢執楚王信田肯賀曰陛下得韓信又治秦中蓋以一時之事故也然考七年長樂宫成九年未央宫成置酒未央前殿蓋其先尚居櫟陽而惟營宫室于長安耳十年七月太上崩櫟陽宫從可知矣今曰是日駕入都關中者非也在櫟陽非長安也紀信乃乘王駕誑楚詐為漢王曰城中食盡漢王降楚軍皆呼萬歲之城東觀漢王乃從西門去漢非楚主安得爭呼萬歲楚兵敵漢安得驟聚東城或曰呼萬歲者楚人賀項王也時范增已去故漢計得行不然成擒易耳後吳王濞夜奔條侯壁驚東南條侯使備西北果從西北入吳大敗條侯其亦有鑒于此與家令說太公曰奈何令人主拜人臣太公乃擁篲迎門却行曰奈何以我亂天下法于是髙祖尊太公為太上皇心善家令言賜金五百斤父子君臣倫義兩重若以此較彼則棄天下如敝屣矣今乃擁篲迎門大似蛇行匍匐業較仲多儼然季子多金猶曰以我亂法而乃尊為太上不如沛父兄之酒酣擊筑極歡道舊故為笑樂者多矣髙祖分羮當必忍之者矣髙祖崩四日不發喪吕后與審食其謀曰非盡族是天下不安人或聞之語酈將軍將軍見食其曰聞帝已崩不發喪欲誅諸將誠如是天下危矣食其入言之乃以丁未發喪不發喪而謀誅諸將事巨且密吕審之外固非一人所得聞也人或聞之其人何人與况告之商與至商語食其使吕后曰何物酈商輒造蜚語商不賈禍乎吕后紀呂后年長常留守希見上益疏如意立為趙王後幾代太子者數矣賴大臣爭之及留侯策太子得毋廢吕后為人剛毅佐髙祖定天下所誅大臣多呂后力長兄周呂侯澤死事封其子呂台為酈侯次兄呂釋之為建成侯外戚世家太史公曰呂娥姁為髙祖正后男為太子及晚節色衰愛弛而戚夫人有寵留侯世家上欲廢太子大臣多諫爭未能堅决呂后使建成侯呂澤劫留侯留侯曰此難以口舌爭也顧上所不能致者天下有四人耳逃匿山中義不為漢臣令太子卑辭安車使辨士固請宜來四人至客建成侯所漢十一年黥布反上病欲使太子將四人曰太子將兵事危矣乃請建成侯急請呂后承間為上泣言于是呂澤立夜見呂后呂后為上泣言如四人意十二年燕置酒太子侍四人從年皆八十餘上驚曰公避逃我今公何自從吾兒游乎四人皆曰太子為人恭敬仁孝愛士天下莫不延頸欲為太子死者四人為壽畢趨去上目送之召戚夫人指示四人者曰羽翼已成難動矣呂后真而主矣功臣表六年正月丙戌周呂令武侯呂澤元年漢九年子呂台酈侯元年功臣表六年正月丙戌建成康侯呂釋之元年呂雉佐定天下醢越斬信其剛毅亦非常也髙祖敢以愛子易元儲乎又敢以愛弛年長色衰易儲子等于姬媵乎况夫涕泣承間婦女之能技也良平呂后太子之羽翰也豈俟皤皤四老而始知乘間始成羽翼耶至曰呂后真而主矣夫豈亦欲其不為主與談何易也况四老者既無令名于天下分爭之日又無經濟于孝惠為帝之年逃匿山中而辨士可請不為漢臣而呂后可要急請間泣唯知柔媚之乞憐延頸欲死勦習游談之浮說即有是人品奚足重至于九年澤死台已襲封十一年夜見之呂澤又胡為乎來哉况建成呂澤名爵互差禁衛森嚴安得夜呼禁闥直入后宫而告之哉易儲重典既不見之髙紀大臣爭諌又不聞是何人角里夏黃皆為烏有愛弛廢儲盡屬子虗者矣善乎楊鐡崖之言曰子房之所呼者老人之贋者也髙誤為真耳然沛公不知有君以鄉老言而始喪義帝不知有父以家令言而始尊太公此二人者知君父之綱常者也太史公不能博訪而著其名并魯兩生之能以禮樂扶世教者皆不得其姓氏徒有黨子拒父四皓之姓名留于殘簡令後世之誤以為賢噫正人而不得名邪人而反奸于正誠不能不為之撫卷太息矣張辟彊為侍中年十五謂丞相曰太后哭不悲請拜呂台呂祿呂産將兵居中用事丞相如計太后悅呂氏權由此始平媚呂者也戮信醢越不即斬噲皆平之甘心左右之也良之辟榖慮呂禍而避之也諸呂用事平借辟彊小兒以啓端耳至曰王諸呂無所不可幾覆劉矣尚敢曰定劉氏後乎乃心不愧王陵耶欲王諸呂先封功臣先立孝惠後宫子風大臣請立諸呂為王后心未嘗不畏外廷也星星之火可以燎原平乃不滅之星星之日而反成其燎原之勢皆平罪也觀平之自言曰我多隂謀必招隂禍及曽孫何坐略人妻棄市國除鬼神福𨼆德而禍隂謀大可畏哉考張良世家子不疑嗣侯傳中不見有所謂辟彊者夫豈又烏有者乎奉天子法駕迎代王于邸即夕入未央宫有謁者十人持㦸衛端門曰天子在也足下何為者而入代王乃謂太尉太尉往諭謁者十人乃掊兵而去孝文紀王至渭橋丞相以下皆迎羣臣拜謁稱臣太尉跪上天子符璽遂即天子位乃使東牟侯清宫載少帝出皇帝即日夕入未央宫宫既清矣少帝既出矣丞相以下皆迎稱臣矣天子即位入宫而奉天子法駕矣此謁者十人獨從夢中來乎况越新天子之警蹕而驟當法駕曰客何為者乎即太尉往諭則新天子明矣乃不俯伏稱萬歲而揚揚掊兵去乎孝景紀二年熒惑守北辰月出北辰間星月出入黃道內外至逺不過十度從未有失度上行直至樞辰間者况月之合朔可推食分可定者乎如此則厯紊矣此蓋妖星之似火妖氣映雲之似月者也觀象者訛之也孝武紀李少君故深澤侯趙將夜入以主方以人之餽遺而饒給誑上曰丹砂可化為黃金以為飲器則益壽居久之少君病死而燕齊怪迂之方士多相效言神仙矣化金之說起而丹砂鉛汞殃飲器益壽之言興而服食詭術售獨不見其病死乎裴駰之注亦迷于迂怪者也劉向上書言黃金可成致費帑金而論死少翁以帛書飯牛而以詐被誅欒大尚主而驗之無實被誅武帝曰自嘆向時愚惑為方士所欺天下豈有仙人盡妖妄耳卓哉親嘗之而真知之也世之論者往往以漢武嫓之秦皇不知秦皇焚棄詩書漢武表章聖學其相去本霄壤但其窮奢欲而惑神仙侈宫室而喜巡游其匹耳然有亡秦之失卒無亡秦之禍者有其本與史記疑問卷上
