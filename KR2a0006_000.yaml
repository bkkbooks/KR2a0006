body:
  text: 史記疑問正史類提要臣等謹案史記疑問三卷國朝邵泰衢撰泰衢有檀弓疑問等書已著録史記採衆說以成書徴引浩博不免抵牾班固嘗議其宗㫖之乖劉知幾頗摘其體例之謬至其叙述之罅漏先儒雖往往疑之而未有専著一書抉其疏舛者泰衢獨旁引異同而一一斷之以理如謂髙祖紀解縱罪人坦然回沛之非情實留侯世家諸將偶語沙中之不可信李陵𫝊兵矢既盡尚殺胸奴萬餘人之言為誇誕據功臣表漢九年吕澤已死而駁留侯世家所紀漢十一年不應又有吕澤大抵皆參互審勘得其間隙故所論多精確不移洵足袪讀史之惑不但如吳縝之糾新唐書祇求諸字句間也是書本與所作檀弓疑問合為一編今以檀弓疑問入經部而是書析入史部俾各從其類焉乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2f074d869ff932190c753c659d3c652329e8a0af46e500e31d4d0255d6276e4c
